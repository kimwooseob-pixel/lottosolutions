<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 예상번호 순위표</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #1a1f2e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }

        .page5-top-bar {
            position: relative;
            max-width: 560px;
            margin: 0 auto 16px;
            min-height: 28px;
        }

        .page5-top-bar .admin-dot {
            position: absolute;
            top: 0;
            right: 0;
        }

        .prediction-actions {
            max-width: 560px;
            margin: 0 auto 24px;
            text-align: center;
        }

        .prediction-button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
        }

        .prediction-button:hover {
            background-color: #2980b9;
        }

        .admin-dot {
            width: 8px;
            height: 8px;
            background-color: #e74c3c;
            border-radius: 50%;
            position: absolute;
            top: 5px;
            right: 5px;
            cursor: pointer;
        }

        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }

        .popup-overlay.show {
            display: block;
        }

        .admin-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            width: 300px;
        }

        .admin-popup.show {
            display: block;
        }

        .admin-popup input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 2px solid #e74c3c;
            border-radius: 5px;
            background-color: #1a1f2e;
            color: white;
            box-sizing: border-box;
        }

        .admin-popup .number-input-container {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            justify-items: center;
        }

        .admin-popup .number-input-container.show {
            display: grid;
        }

        .admin-popup .number-input-container input[type="number"] {
            width: 60px;
            padding: 10px;
            border: 2px solid #3498db;
            border-radius: 5px;
            background-color: #1a1f2e;
            color: white;
            text-align: center;
            font-size: 1.1em;
        }

        .admin-popup .draw-label {
            grid-column: 1 / -1;
            text-align: center;
            color: #90caf9;
            font-size: 1.1em;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .admin-popup button {
            width: 100%;
            padding: 10px;
            background-color: #e74c3c;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .admin-popup button:hover {
            background-color: #c0392b;
        }

        .admin-popup .error-message {
            color: #e74c3c;
            margin-bottom: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        /* 랭킹 대시보드 (page4와 동일) */
        .ranking-dashboard {
            max-width: 560px;
            margin: 0 auto 20px;
        }

        .rank-card {
            background: #1e2d4a;
            border-radius: 14px;
            padding: 18px 16px;
            margin-bottom: 14px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(0, 188, 212, 0.12);
        }

        .rank-section-title {
            margin: 0 0 14px;
            font-size: 1.05rem;
            font-weight: 700;
            color: #00bcd4;
            letter-spacing: -0.02em;
        }

        .ranking-dashboard .ball-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .rank-ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }

        .rank-ball--win {
            background: linear-gradient(145deg, #ef5350, #c62828);
        }

        .rank-ball--pred {
            background: linear-gradient(145deg, #26c6da, #00838f);
        }

        .rank-ball--pred-alt {
            background: linear-gradient(145deg, #4fc3f7, #0277bd);
        }

        .rank-ball--top {
            background: linear-gradient(145deg, #ffb74d, #f9a825);
            color: #1a2035;
        }

        .top6-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 12px 8px;
        }

        .top6-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 52px;
        }

        .top6-count {
            font-size: 0.78rem;
            color: #90a4ae;
        }

        .history-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .history-row:last-child {
            border-bottom: none;
        }

        .history-draw {
            min-width: 52px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #b0bec5;
        }

        .history-status {
            margin-left: auto;
            font-size: 0.82rem;
            font-weight: 600;
            color: #80deea;
        }

        .history-status--wait {
            color: #78909c;
        }

        .history-status--hit {
            color: #ffab40;
        }

        .top-user-block {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .top-user-block:last-child {
            border-bottom: none;
        }

        .top-user-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .ranking-dashboard .medal {
            font-size: 1.45rem;
            line-height: 1;
        }

        .top-user-name {
            font-weight: 700;
            color: #eceff1;
            flex: 1;
        }

        .top-user-matches {
            font-size: 0.88rem;
            color: #00bcd4;
            font-weight: 700;
        }

        .ranking-dashboard .empty-hint {
            font-size: 0.88rem;
            color: #78909c;
            margin: 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <header class="page5-top-bar" aria-label="페이지 도구">
        <div class="admin-dot" title="관리자"></div>
    </header>

    <div class="ranking-dashboard">
        <section class="rank-card" id="section-winning">
            <h2 class="rank-section-title" id="winning-section-title">당첨번호</h2>
            <div class="ball-row" id="winning-balls"></div>
        </section>

        <section class="rank-card" id="section-my-history">
            <h2 class="rank-section-title">나의 예측 히스토리</h2>
            <div id="my-history-list"></div>
        </section>

        <section class="rank-card" id="section-top6">
            <h2 class="rank-section-title">많이 예측된 번호 TOP 6</h2>
            <p class="empty-hint" id="top6-subhint" style="margin-bottom:10px;"></p>
            <div class="top6-grid" id="top6-grid"></div>
        </section>

        <section class="rank-card" id="section-top-users">
            <h2 class="rank-section-title">많이 맞춘 유저 TOP 3</h2>
            <div id="top-users-list"></div>
        </section>
    </div>

    <div class="prediction-actions">
        <button class="prediction-button" id="savePrediction">예측번호 저장하기</button>
    </div>

    <!-- 관리자 모달 -->
    <div class="popup-overlay"></div>
    <div class="admin-popup">
        <div class="password-section">
            <input type="password" placeholder="관리자 비밀번호" id="adminPassword">
            <div class="error-message">비밀번호가 일치하지 않습니다.</div>
            <button id="passwordSubmit">확인</button>
        </div>
        <div class="number-input-container">
            <div class="draw-label" id="drawLabel">당첨번호 입력</div>
            <input type="number" min="1" max="45" placeholder="1번">
            <input type="number" min="1" max="45" placeholder="2번">
            <input type="number" min="1" max="45" placeholder="3번">
            <input type="number" min="1" max="45" placeholder="4번">
            <input type="number" min="1" max="45" placeholder="5번">
            <input type="number" min="1" max="45" placeholder="6번">
            <button id="saveWinningNumbers">당첨번호 저장</button>
        </div>
    </div>

    <script>
        // Firebase 초기화
        const firebaseConfig = {
            apiKey: "AIzaSyAwh55rLOQkY8ZVCzaC4ZF3iaUVU5Vu0GM",
            authDomain: "ai-lottosolutions.firebaseapp.com",
            databaseURL: "https://ai-lottosolutions-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ai-lottosolutions",
            storageBucket: "ai-lottosolutions.appspot.com",
            messagingSenderId: "616782090306",
            appId: "1:616782090306:web:688c710998dfce8e4d5ddb"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const database = firebase.database();
        
        // 현재 로그인한 사용자 정보 가져오기
        const loggedInUser = sessionStorage.getItem('loggedInUser');
        const userUid = sessionStorage.getItem('userUid');

        // 로그인하지 않아도 페이지 열람 가능, 단 저장 기능은 로그인 필요

        /** 관리자가 입력 중인 당첨 회차 (drawRange.end + 1, Firebase에서 계산) */
        let adminDrawToSave = null;

        // 예측번호 저장
        document.getElementById('savePrediction').addEventListener('click', function() {
            if (!userUid) {
                alert('로그인이 필요합니다.');
                return;
            }

            database.ref('drawRange').once('value').then(function(rangeSnap) {
                const r = rangeSnap.val() || {};
                const drawNo = r.next != null ? String(r.next) : '';

                const predictionRef = database.ref('predictions').push();
                const prediction = {
                    userId: userUid,
                    numbers: generateRandomNumbers(), // 실제로는 페이지4에서 가져온 번호 사용
                    timestamp: Date.now(),
                    nickname: loggedInUser,
                    drawNo: drawNo
                };

                return predictionRef.set(prediction);
            })
                .then(() => {
                    alert('예측번호가 저장되었습니다.');
                })
                .catch(error => {
                    console.error('예측번호 저장 실패:', error);
                    alert('예측번호 저장에 실패했습니다.');
                });
        });

        // 임시로 랜덤 번호 생성 (실제로는 페이지4의 예측 번호 사용)
        function generateRandomNumbers() {
            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            return numbers.sort((a, b) => a - b);
        }

        // 관리자 모달 관련 코드
        document.querySelector('.admin-dot').addEventListener('click', function() {
            document.querySelector('.popup-overlay').classList.add('show');
            document.querySelector('.admin-popup').classList.add('show');
            document.getElementById('adminPassword').value = '';
            document.querySelector('.error-message').style.display = 'none';
            document.querySelector('.number-input-container').classList.remove('show');
        });

        document.querySelector('.popup-overlay').addEventListener('click', function() {
            document.querySelector('.popup-overlay').classList.remove('show');
            document.querySelector('.admin-popup').classList.remove('show');
        });

        document.getElementById('passwordSubmit').addEventListener('click', function() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'knue2000') {
                document.querySelector('.password-section').style.display = 'none';
                document.querySelector('.number-input-container').classList.add('show');

                database.ref('drawRange').once('value').then(function(snap) {
                    const r = snap.val() || {};
                    const endNum = parseInt(r.end, 10);
                    const nextNum = !isNaN(endNum) ? endNum + 1 : 1168;
                    adminDrawToSave = String(nextNum);
                    document.getElementById('drawLabel').textContent = `${adminDrawToSave}회차 당첨번호 입력`;
                }).catch(function() {
                    adminDrawToSave = '1168';
                    document.getElementById('drawLabel').textContent = `${adminDrawToSave}회차 당첨번호 입력`;
                });
            } else {
                document.querySelector('.error-message').style.display = 'block';
            }
        });

        document.getElementById('saveWinningNumbers').addEventListener('click', function() {
            const inputs = document.querySelectorAll('.number-input-container input[type="number"]');
            const numbers = Array.from(inputs).map(input => parseInt(input.value));
            
            // 유효성 검사
            if (numbers.some(num => isNaN(num) || num < 1 || num > 45)) {
                alert('1부터 45 사이의 숫자를 입력해주세요.');
                return;
            }
            
            if (new Set(numbers).size !== 6) {
                alert('중복되지 않는 6개의 숫자를 입력해주세요.');
                return;
            }

            // 번호 정렬
            numbers.sort((a, b) => a - b);

            const runUpdate = function(drawKeyStr) {
                const currentDrawNum = parseInt(drawKeyStr, 10);
                if (isNaN(currentDrawNum)) {
                    alert('회차 정보를 확인할 수 없습니다. 관리자 화면을 닫았다가 다시 열어주세요.');
                    return;
                }
                const nextDraw = currentDrawNum + 1;

                const updates = {};

                updates[`/winningNumbers/${drawKeyStr}`] = {
                    numbers: numbers,
                    timestamp: Date.now()
                };

                updates['/currentDraw'] = {
                    drawNumber: drawKeyStr,
                    lastUpdated: Date.now()
                };

                const startDraw = Math.max(1, currentDrawNum - 14);
                updates['/drawRange'] = {
                    start: String(startDraw),
                    end: drawKeyStr,
                    next: String(nextDraw)
                };

                updates['/systemUpdates/latest'] = {
                    type: 'newDrawNumber',
                    timestamp: Date.now(),
                    draw: currentDrawNum
                };

                database.ref().update(updates)
                    .then(() => {
                        alert('당첨번호가 성공적으로 저장되었습니다.');
                        document.querySelector('.admin-popup').classList.remove('show');
                        document.querySelector('.popup-overlay').classList.remove('show');
                        location.reload();
                    })
                    .catch(error => {
                        console.error('저장 중 오류 발생:', error);
                        alert('저장 중 오류가 발생했습니다: ' + error.message);
                    });
            };

            if (adminDrawToSave) {
                runUpdate(adminDrawToSave);
            } else {
                database.ref('drawRange').once('value').then(function(snap) {
                    const r = snap.val() || {};
                    const endNum = parseInt(r.end, 10);
                    const key = String(!isNaN(endNum) ? endNum + 1 : 1168);
                    runUpdate(key);
                });
            }
        });

        function setupSystemUpdateListener() {
            let listenerPrimed = false;
            let lastSeenDraw = null;

            database.ref('systemUpdates/latest').on('value', snapshot => {
                if (!snapshot.exists()) return;
                const update = snapshot.val();
                if (!update || update.type !== 'newDrawNumber') return;

                const drawKey =
                    update.draw != null ? String(update.draw) : null;

                if (!listenerPrimed) {
                    listenerPrimed = true;
                    lastSeenDraw = drawKey;
                    return;
                }

                if (drawKey != null && drawKey !== lastSeenDraw) {
                    lastSeenDraw = drawKey;
                    window.location.reload();
                }
            });
        }

        window.addEventListener('load', function() {
            setupSystemUpdateListener();
        });
    </script>
    <script src="../js/page5.js"></script>
</body>
</html>
