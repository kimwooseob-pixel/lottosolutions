<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 벽돌깨기 게임</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg-navy: #050510;
            --panel-navy: #0a1220;
            --neon-cyan: #00ccff;
            --text-muted: #8daab8;
            --brick-dark: #1a2233;
            --brick-blue: #0044cc;
            --play-bg: #060b14;
            --brick-rows: 15;
            --brick-row-gap: 1px;
            --brick-top-offset: 20px;
            --play-area-height: 200px;
            --brick-row-height: 19px;
            --round-label-width: 45px;
        }

        body {
            margin: 0;
            padding: 20px 20px 96px;
            background: var(--bg-navy);
            background-image:
                radial-gradient(ellipse 100% 80% at 50% -15%, rgba(0, 204, 255, 0.07), transparent 55%),
                linear-gradient(180deg, #050510 0%, #0a0f18 100%);
            font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-wrapper {
            background: var(--panel-navy);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 204, 255, 0.12);
            position: relative;
            border: 1px solid rgba(0, 204, 255, 0.22);
        }

        .game-info {
            width: 100%;
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(0, 20, 40, 0.55);
            border: 1px solid rgba(0, 204, 255, 0.2);
        }

        .game-info p {
            margin: 0;
            font-size: 0.82rem;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .game-info p strong {
            color: var(--neon-cyan);
            font-weight: 700;
        }

        .game-container {
            width: 720px;
            height: 520px;
            background: var(--play-bg);
            position: relative;
            border-radius: 10px;
            overflow: visible;
            margin-bottom: 20px;
            padding: 0;
            box-sizing: border-box;
            margin-left: 56px;
            border: 1px solid rgba(0, 204, 255, 0.15);
        }

        .round-display {
            display: none;
        }

        .number-header {
            display: none;
        }

        .round-header {
            position: absolute;
            left: calc(-1 * (var(--round-label-width) + 8px));
            top: var(--brick-top-offset);
            height: calc((var(--brick-row-height) * var(--brick-rows)) + (var(--brick-row-gap) * (var(--brick-rows) - 1)));
            width: var(--round-label-width);
            display: grid;
            grid-template-rows: repeat(var(--brick-rows), var(--brick-row-height));
            gap: var(--brick-row-gap);
            padding: 0;
            z-index: 100;
            pointer-events: none;
        }

        .round-number {
            height: var(--brick-row-height);
            font-size: 11px;
            color: #e2e8f0;
            text-align: right;
            padding-right: 5px;
            line-height: 1;
            background: rgba(0, 30, 50, 0.65);
            border-radius: 3px;
            margin: 0;
            font-weight: bold;
            border: 1px solid rgba(0, 204, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .round-number.prediction-label {
            color: #fff;
            background: rgba(0, 68, 204, 0.35);
            border-color: rgba(0, 204, 255, 0.35);
        }

        .game-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--play-bg);
        }

        .play-area {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: var(--play-area-height);
            background: var(--play-bg);
            border-top: none;
        }

        #brickContainer {
            position: absolute;
            width: 100%;
            top: var(--brick-top-offset);
            left: 0;
            right: 0;
            height: calc((var(--brick-row-height) * var(--brick-rows)) + (var(--brick-row-gap) * (var(--brick-rows) - 1)));
            padding: 0;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(45, 1fr);
            grid-template-rows: repeat(var(--brick-rows), var(--brick-row-height));
            gap: var(--brick-row-gap);
            background: #030810;
            border-bottom: none;
            overflow: visible;
        }

        .brick {
            width: 100%;
            height: 100%;
            position: relative;
            border: none;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: rgba(255, 255, 255, 0.92);
            background-color: var(--brick-dark);
            transition: background-color 0.2s, opacity 0.2s;
            cursor: default;
            user-select: none;
            margin: 0;
            padding: 0;
            outline: 1px solid rgba(0, 204, 255, 0.12);
        }

        .brick.brick-dark {
            background-color: var(--brick-dark);
            color: rgba(255, 255, 255, 0.4);
        }

        .brick-special-explode3 {
            background: linear-gradient(180deg, #cc2200, #8f1200) !important;
        }

        .brick-special-explode2 {
            background: linear-gradient(180deg, #cc5500, #9a3c00) !important;
        }

        .brick-special-split2 {
            background: linear-gradient(180deg, #888800, #5f5f00) !important;
        }

        .brick-special-split4 {
            background: linear-gradient(180deg, #0b7c2a, #045019) !important;
        }

        .brick.header-brick {
            background-color: var(--brick-blue) !important;
            color: #fff;
            font-weight: bold;
            outline: 1px solid rgba(0, 204, 255, 0.45);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        /* 일반 벽돌 클릭은 상위 컨테이너로 전달 */
        .brick:not(.header-brick):not(.header-brick--picked) {
            pointer-events: none;
        }

        #ball {
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            left: 0;
            top: 0;
            transform: none;
            z-index: 10;
            transition: none !important;
        }

        .temp-ball {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            position: absolute;
            background: #d8f6ff;
            box-shadow: 0 0 8px rgba(140, 236, 255, 0.85);
            z-index: 11;
            pointer-events: none;
            transition: none !important;
        }

        #paddle {
            width: 240px;
            height: 10px;
            background: linear-gradient(180deg, #1e3a5f, #0f172a);
            border: 1px solid rgba(0, 204, 255, 0.4);
            position: absolute;
            left: 50%;
            bottom: 15px;
            transform: translateX(-50%);
            border-radius: 5px;
            z-index: 10;
            box-shadow: 0 0 12px rgba(0, 204, 255, 0.2);
            transition: width 1s ease, left 1s ease;
        }

        #launchHint {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateX(-50%);
            color: #00e5ff;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: 0.02em;
            white-space: nowrap;
            pointer-events: none;
            z-index: 250;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.95), 0 0 24px rgba(0, 229, 255, 0.7), 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
        }

        .controls .toolbar-btn {
            padding: 16px 26px;
            font-size: 17px;
            font-weight: 700;
            border: 1px solid rgba(0, 229, 255, 0.35);
            border-radius: 14px;
            cursor: pointer;
            background: #0f1a2d;
            color: #e8f4f8;
            transition: background 0.2s, box-shadow 0.2s, transform 0.15s, filter 0.2s;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .controls .toolbar-btn:hover:not(:disabled) {
            background: #14233c;
            box-shadow: 0 0 18px rgba(0, 204, 255, 0.2);
            transform: translateY(-1px);
        }

        .controls .toolbar-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #resetButton {
            border-color: rgba(102, 160, 210, 0.6);
            background: linear-gradient(180deg, #172338, #101b2d);
        }

        #godModeButton {
            color: #2b1a00;
            border-color: rgba(255, 203, 85, 0.8);
            background: linear-gradient(180deg, #ffd86b, #f5b740);
            box-shadow: 0 8px 18px rgba(245, 183, 64, 0.35);
        }

        #godModeButton:hover:not(:disabled) {
            background: linear-gradient(180deg, #ffe089, #f7c55b);
            box-shadow: 0 10px 22px rgba(245, 183, 64, 0.45);
            filter: brightness(1.03);
        }

        .bottom-tabbar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 500;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            background: #0a1220;
            border-top: 1px solid rgba(0, 229, 255, 0.22);
            box-shadow: 0 -8px 20px rgba(0, 0, 0, 0.35);
        }

        .tab-item {
            padding: 10px 4px 12px;
            text-decoration: none;
            color: #90a8bc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            min-height: 62px;
            transition: color 0.2s, background-color 0.2s;
        }

        .tab-item .tab-icon {
            font-size: 18px;
            line-height: 1;
        }

        .tab-item--active {
            color: #00e5ff;
            background: rgba(0, 229, 255, 0.08);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.45);
        }

        .tab-item:hover {
            color: #c1d3e3;
            background: rgba(255, 255, 255, 0.04);
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(45, 1fr);
            gap: 1px;
            margin-bottom: 10px;
            padding: 6px;
            background: rgba(0, 20, 40, 0.5);
            border-radius: 8px;
            border: 1px solid rgba(0, 204, 255, 0.15);
        }

        .number-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: rgba(255, 255, 255, 0.75);
            background: rgba(10, 18, 32, 0.9);
        }

        .winning-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .draw-round {
            font-size: 18px;
            font-weight: bold;
            color: #3498db;
        }

        .winning-numbers {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .winning-ball {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 25, 45, 0.55);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 204, 255, 0.12);
        }

        .stat-item {
            text-align: center;
            color: #ecf0f1;
        }

        .stat-label {
            font-size: 14px;
            margin-bottom: 5px;
            color: #bdc3c7;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: var(--neon-cyan);
        }

        .prediction-section {
            background: #34495e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .prediction-title {
            color: #f39c12;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .predicted-numbers {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .lotto-ball {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .game-wrapper {
                margin: 10px;
                padding: 15px;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }

            .stat-item {
                display: flex;
                justify-content: space-between;
                width: 100%;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .controls .toolbar-btn {
                width: 100%;
                max-width: 280px;
                margin: 0 auto;
            }

            #launchHint {
                font-size: 20px;
                text-align: center;
                white-space: normal;
                padding: 0 12px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-info">
            <p><strong>각 벽돌은 역대 로또 실제 당첨번호!</strong></p>
            <p><strong>파란벽돌을 깨서 다음 회차를 예측해보세요!</strong></p>
        </div>
        
        <div id="numberGrid" class="number-grid">
            <!-- 번호 그리드는 JavaScript로 생성됩니다 -->
        </div>
        
        <div class="game-container">
            <div class="round-display">1회차</div>
            <div class="number-header">
                <span>번호</span>
            </div>
            <div class="round-header">
                <span>회차</span>
            </div>
            <div id="brickContainer">
                <!-- 벽돌들은 JavaScript로 생성됩니다 -->
            </div>
            <div id="ball" class="ball main-ball"></div>
            <div class="play-area">
                <div id="paddle"></div>
                <div id="launchHint">벽돌 영역을 탭해 공 발사</div>
                <div id="bottomWall" style="display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 20px; background: linear-gradient(180deg, rgba(0,68,204,0.85), rgba(0,40,90,0.95)); border-top: 1px solid rgba(0,204,255,0.35);"></div>
            </div>
        </div>
        
        <div class="controls">
            <button type="button" id="resetButton" class="toolbar-btn">🔄 다시하기</button>
            <button type="button" id="godModeButton" class="toolbar-btn">🛡️ 무적모드</button>
            <div id="gameStatus" style="color: rgba(0,204,255,0.9); margin-top: 6px; width: 100%; text-align: center; min-height: 20px; font-size: 0.85rem;"></div>
        </div>
    </div>

    <nav class="bottom-tabbar" aria-label="하단 메뉴">
        <a class="tab-item tab-item--active" href="brick-game.html">
            <span class="tab-icon">🧱</span>
            <span>벽돌게임</span>
        </a>
        <a class="tab-item" href="wheel-game.html">
            <span class="tab-icon">🎯</span>
            <span>로또다트</span>
        </a>
        <a class="tab-item" href="random-numbers.html">
            <span class="tab-icon">🎱</span>
            <span>번호뽑기</span>
        </a>
        <a class="tab-item" href="page5.html">
            <span class="tab-icon">❤️</span>
            <span>나의번호</span>
        </a>
        <a class="tab-item" href="page5.html">
            <span class="tab-icon">📊</span>
            <span>통계</span>
        </a>
    </nav>
    
    <!-- 회차/당첨: brick-game.js에서 RTDB 읽기 전용(currentDraw, winningNumbers/*) + LOTTO_DATA 폴백 -->
    <script src="../js/lotto-data.js"></script>
    <script src="../js/brick-game.js"></script>
</body>
</html>
